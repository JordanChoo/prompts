name: Build Palette

on:
  push:
    paths:
      - 'dev/*.md'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build command_palette.md
        run: |
          chmod +x ./dev/scripts/build-palette.sh
          ./dev/scripts/build-palette.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/dist/command_palette.md
          git diff --staged --quiet || git commit -m "chore: rebuild command_palette.md"
          git push

